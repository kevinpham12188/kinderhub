name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: |
          if [ -f "*.sln" ] || ls *.sln 2>/dev/null; then
            dotnet restore
          else
            echo "No solution file yet — skipping restore"
          fi

      - name: Build
        run: |
          if ls *.sln 2>/dev/null; then
            dotnet build --no-restore --configuration Release
          else
            echo "No solution file yet — skipping build"
          fi

      - name: Test
        run: |
          if ls *.sln 2>/dev/null; then
            dotnet test --no-build --configuration Release --verbosity normal
          else
            echo "No solution file yet — skipping test"
          fi